<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グラフ視覚化・重み計算ツール</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
</head>
<body>

<div id="custom-error-container" class="error-toast-container"></div>

<h1>グラフ視覚化・重み計算</h1>

<!-- 左パネル: 入力パネル -->
<div id="sidebar-left" class="sidebar-panel">
    <button id="toggle-left" class="toggle-btn">◀</button>
    <h2>入力パネル</h2>
    <p class="description">
        頂点と辺の情報を入力してください。<br>
        形式: <code>頂点1 頂点2 重み</code><br>
        例: <code>S G 10</code>
    </p>
    <textarea id="input-data" placeholder="S A 4&#10;A B 2&#10;B G 5&#10;S G 10">S A 7
A B 2
B G 4
S G 9
G A 1
B C 3
C A 6
C S 2
</textarea>

<div class="label-setting-section">
    <div class="panel-label" style="background-color: #e57373; color: white;">任意ステータス設定</div>
    <div class="label-input-area">
        <input type="text" id="custom-label-input" placeholder="ステータス名">
        <div class="status-btn-row">
            <button id="set-numeric-btn" class="status-action-btn">数値で設定</button>
            <button id="set-string-btn" class="status-action-btn">文字列で設定</button>
        </div>
    </div>
</div>

<div class="direction-switch-section">
    <span class="mode-label">無向</span>
    <label class="switch">
        <input type="checkbox" id="direction-toggle">
        <span class="slider round"></span>
    </label>
    <span class="mode-label">有向</span>
</div>

<button id="update-btn">グラフを生成</button>
</div>

<!-- 右パネル: 操作パネル -->
<div id="sidebar-right" class="sidebar-panel">
    <button id="toggle-right" class="toggle-btn">▶</button>
    <h2>計算パネル</h2>
    <div class="mode-switch-section">
        <span class="mode-label">通常</span>
        <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider round"></span>
        </label>
        <span class="mode-label">割引率</span>
        <div class="gamma-container">
            <input type="number" id="gamma-input" step="0.01" min="0.1" max="1" value="0.95" placeholder="γ">
            <div id="gamma-warning" class="input-warning">0 < γ ≤ 1 の範囲で入力してください</div>
        </div>
    </div>

    <!-- 最短路探索エリア -->
    <div class="shortest-path-section">
        <div class="panel-label" id="shortest-path-label">最短経路の自動探索</div>
        <div class="shortest-path-content">
            <div class="vertex-input-row">
                <input type="text" id="start-vertex" class="vertex-input" value="S" maxlength="5">
                <span class="arrow-separator">→</span>
                <input type="text" id="target-vertex" class="vertex-input" value="G" maxlength="5">
            </div>
        </div>
        <button id="shortest-path-btn">最短路を自動探索</button>
    </div>

    <div class="resizer-container">
        <div id="panel-top" class="panel-area">
            <div id="used-edges-label" class="panel-label">使用辺</div>
            <div id="used-edges-list" class="panel-content edge-list-container"></div>
            <div id="edge-order-info" class="info-message">使用辺の順序は経路の順路に対応しています</div>
        </div>
        <div id="resizer-h" class="resizer-handle"></div>
        <div id="panel-bottom" class="panel-area">
            <div id="unused-edges-label" class="panel-label">未使用辺</div>
            <div id="unused-edges-list" class="panel-content edge-list-container">
                <!-- はじめにすべての辺がここに並ぶ -->
            </div>
            <button id="calc-sum-btn" style="margin: 5px; background-color: #9c27b0;">重み合計を計算</button>
        </div>
    </div>
</div>

<!-- 計算結果表示ウィンドウ（可動式） -->
<div id="result-window" class="floating-window">
    <div id="result-window-header" class="window-header">
        計算結果
        <span id="history-counter" class="history-counter">(0/10)</span>
    </div>
    <div id="result-content" class="window-content">
        <p class="placeholder">計算結果がここに表示されます</p>
    </div>
</div>

<div id="main">
    <div id="cy"></div>
    <!-- 頂点ステータスのオーバーレイコンテナ -->
    <div id="vertex-status-container" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; width: 100%; height: 100%; overflow: hidden;"></div>
    <!-- 再配置中オーバーレイ -->
    <div id="layout-loading" class="layout-overlay">
        <div class="loading-content">
            <span class="loading-text">再配置中...</span>
        </div>
    </div>
    <!-- グラフ内コントロールパネル -->
    <div id="graph-controls" class="graph-floating-panel">
        <button class="graph-ctrl-btn" id="layout-btn">再配置</button>
        
        <div class="zoom-controls-wrapper">
            <button class="zoom-btn" id="zoom-out-btn">◀</button>
            <div class="zoom-input-box">
                <input type="number" id="zoom-input" value="100" step="5" min="1" max="1000">
                <span class="zoom-percent-unit">%</span>
            </div>
            <button class="zoom-btn" id="zoom-in-btn">▶</button>
        </div>

        <button class="graph-ctrl-btn" id="fit-btn">全体を表示</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
